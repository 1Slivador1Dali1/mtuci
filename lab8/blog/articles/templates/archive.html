<!DOCTYPE html>
<html>
    <head>
        <title>Архив всех статей</title>
        {% load static %}
        <link rel="stylesheet" href="{% static 'css/article.css' %}">
    </head>
    <body class="archive">
        <div class="header">
            <img src="{% static 'img/dpb-logo.png' %}" alt="Логотип" class="logo" />
            
            <div class="user-info">
                {% if user.is_authenticated %}
                    <span>Привет, {{ user.username }}!</span>
                    <a href="{% url 'logout' %}" class="header-link">Выйти</a>
                {% else %}
                    <a href="{% url 'login' %}" class="header-link">Войти</a>
                    <a href="{% url 'register' %}" class="header-link">Регистрация</a>
                {% endif %}
            </div>
        </div>
        
        <div class="create-post-link">
            <a href="{% url 'create_post' %}" class="create-btn">+ Написать статью</a>
        </div>
        
        <div class="archive">
            {% for post in posts %}
            <div class="one-post">
                <div class="post-management">
                    <h2 class="post-title">
                        <a href="{% url 'get_article' article_id=post.id %}">{{ post.title }}</a>
                    </h2>
                    <button class="fold-button">свернуть</button>
                </div>
                <div class="article-info">
                    <div class="article-author">{{ post.author.username }}</div>
                    <div class="article-created-date">{{ post.created_date }}</div>
                </div>
                <p class="article-text">{{ post.get_excerpt }}</p>
                <div class="one-post-shadow"></div>
            </div>
            {% endfor %}
        </div>
        
        <script src="{% static 'js/jquery.js' %}"></script>
        <script src="{% static 'js/helloworld.js' %}"></script>
        <script src="{% static 'js/fold-post-improved.js' %}"></script>
        <script src="{% static 'js/highlight-post.js' %}"></script>
    </body>
</html>
